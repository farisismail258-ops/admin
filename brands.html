<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Brands — Glow Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page">
      <div class="page-header">
        <div class="title-block"><div class="crumbs">Catalog · Brands</div><h1>Brands</h1><p>Manage the labels you carry.</p></div>
        <div class="page-actions"><button class="btn btn-accent" id="newBtn"></button></div>
      </div>
      <div class="card-grid" id="grid"></div>
    </div>
  </main>
</div>
<script src="../js/icons.js"></script><script src="../js/data.js"></script><script src="../js/layout.js"></script>
<script>
window.PAGE_DEPTH=1;renderLayout("brands");
document.getElementById("newBtn").innerHTML=icon("plus",14)+" New brand";
document.getElementById("grid").innerHTML=MOCK.brands.map(b=>`
  <div class="tile">
    <div class="cover" style="background:${b.grad};font-size:36px;font-weight:800;letter-spacing:-.04em">${b.logo}</div>
    <h3>${b.name}</h3>
    <div class="sub">${b.products} products · ${b.sales} 30d</div>
    <div class="row"><span class="status ${b.status==="active"?"active":"draft"}">${b.status[0].toUpperCase()+b.status.slice(1)}</span><button class="icon-btn">${icon("more",16)}</button></div>
  </div>`).join("");
</script></body></html>
