<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Featured — Glow Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page">
      <div class="page-header">
        <div class="title-block"><div class="crumbs">Catalog · Featured</div><h1>Featured products</h1><p>Pin the products that appear on the homepage and bestseller rails.</p></div>
        <div class="page-actions"><button class="btn btn-secondary">Preview store</button><button class="btn btn-accent">Save order</button></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-head"><div class="left"><h2>Currently featured</h2><p>Drag to reorder</p></div></div>
          <div class="card-body"><div class="builder-list" id="picks"></div></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="left"><h2>Add product</h2><p>Click to feature</p></div></div>
          <div class="card-body"><div class="list" id="pool"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/icons.js"></script><script src="../js/data.js"></script><script src="../js/layout.js"></script>
<script>
window.PAGE_DEPTH=1;renderLayout("featured");
document.getElementById("picks").innerHTML=MOCK.products.slice(0,5).map(p=>`
  <div class="builder-item">
    <span class="grip">${icon("menu",16)}</span>
    <div class="icon-box">${p.emoji}</div>
    <div class="meta"><b>${p.name}</b><span>${p.brand} · $${p.price}</span></div>
    <button class="btn btn-ghost btn-sm">${icon("trash",13)}</button>
  </div>`).join("");
document.getElementById("pool").innerHTML=MOCK.products.slice(5).map(p=>`
  <div class="list-item">
    <div class="thumb">${p.emoji}</div>
    <div class="meta"><b>${p.name}</b><span>${p.brand} · ${p.cat}</span></div>
    <button class="btn btn-secondary btn-sm">${icon("plus",13)} Feature</button>
  </div>`).join("");
</script></body></html>
