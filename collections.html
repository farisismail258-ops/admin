<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Collections — Glow Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page">
      <div class="page-header">
        <div class="title-block"><div class="crumbs">Catalog · Collections</div><h1>Collections</h1><p>Curated edits, seasonal drops, and themed bundles.</p></div>
        <div class="page-actions"><button class="btn btn-secondary">Sort</button><button class="btn btn-accent" id="newBtn"></button></div>
      </div>
      <div class="card-grid" id="grid"></div>
    </div>
  </main>
</div>
<script src="../js/icons.js"></script><script src="../js/data.js"></script><script src="../js/layout.js"></script>
<script>
window.PAGE_DEPTH=1;renderLayout("collections");
document.getElementById("newBtn").innerHTML=icon("plus",14)+" New collection";
const stmap={active:"active",draft:"draft",scheduled:"scheduled"};
const grads=["var(--grad-1)","var(--grad-2)","var(--grad-3)","linear-gradient(135deg,#f78fcb,#ffb547)","linear-gradient(135deg,#4f8cff,#00d4ff)","linear-gradient(135deg,#ff5a5f,#ffb547)"];
document.getElementById("grid").innerHTML=MOCK.collections.map((c,i)=>`
  <div class="tile">
    <div class="cover" style="background:${grads[i%grads.length]}">${c.image}</div>
    <h3>${c.name}</h3>
    <div class="sub">${c.products} products · ${c.schedule}</div>
    <div class="row"><span class="status ${stmap[c.status]}">${c.status[0].toUpperCase()+c.status.slice(1)}</span><button class="icon-btn">${icon("more",16)}</button></div>
  </div>`).join("");
</script></body></html>
